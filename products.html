<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Products — Teryx</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="products">

  <!-- ── HEADER ── -->
  <header class="site-header">
    <div class="nav-inner">
      <a href="index.html" class="nav-logo" aria-label="Teryx Home">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 60" height="36">
          <circle cx="30" cy="30" r="22" fill="none" stroke="#2B2B2B" stroke-width="1.5"/>
          <line x1="18" y1="22" x2="42" y2="22" stroke="#2B2B2B" stroke-width="2.2" stroke-linecap="square"/>
          <line x1="30" y1="22" x2="30" y2="40" stroke="#2B2B2B" stroke-width="2.2" stroke-linecap="square"/>
          <line x1="68" y1="14" x2="68" y2="46" stroke="#B3B3B3" stroke-width="0.8"/>
          <text x="82" y="35" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="18" font-weight="300" letter-spacing="6" fill="#2B2B2B">TERYX</text>
        </svg>
      </a>
      <nav class="nav-links">
        <a href="index.html">Home</a>
        <a href="products.html" class="active">Products</a>
        <a href="cart.html">Cart</a>
      </nav>
      <a href="cart.html" class="cart-btn" aria-label="View cart">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/>
          <path d="M16 10a4 4 0 01-8 0"/>
        </svg>
        <span class="cart-count">0</span>
      </a>
      <button class="hamburger" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </header>

  <nav class="mobile-nav">
    <a href="index.html">Home</a>
    <a href="products.html">Products</a>
    <a href="cart.html">Cart</a>
  </nav>

  <!-- ── MAIN ── -->
  <main class="prod-main">
    <div class="container">

      <div class="prod-hdr fade-in">
        <p class="lbl">Our Collection</p>
        <h2>All Products</h2>
      </div>

      <div class="prod-layout">

        <!-- ── SIDEBAR FILTERS ── -->
        <aside class="sidebar" aria-label="Product filters">

          <!-- Category filter -->
          <div class="filter-blk">
            <div class="filter-title">Category</div>
            <label class="filter-opt">
              <input type="checkbox" name="cat" value="phones">
              <label for="cat-phones">Phones</label>
            </label>
            <label class="filter-opt">
              <input type="checkbox" name="cat" value="laptops">
              <label for="cat-laptops">Laptops</label>
            </label>
            <label class="filter-opt">
              <input type="checkbox" name="cat" value="bags">
              <label for="cat-bags">Bags</label>
            </label>
            <label class="filter-opt">
              <input type="checkbox" name="cat" value="watches">
              <label for="cat-watches">Watches</label>
            </label>
          </div>

          <!-- Price range filter -->
          <div class="filter-blk">
            <div class="filter-title">Max Price</div>
            <div>
              <input type="range" id="price-range" class="price-slider"
                     min="50" max="1600" value="1600" step="50"
                     aria-label="Maximum price filter">
              <div class="price-vals">
                <span>$50</span>
                <span id="price-val">$1,600</span>
              </div>
            </div>
          </div>

        </aside><!-- /sidebar -->

        <!-- ── PRODUCTS AREA ── -->
        <div>

          <!-- Search + sort bar -->
          <div class="search-row">
            <div class="search-wrap">
              <span class="search-ico" aria-hidden="true">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
                </svg>
              </span>
              <input
                type="search"
                id="search-input"
                class="search-input"
                placeholder="Search products..."
                aria-label="Search products"
                autocomplete="off"
              >
            </div>

            <select id="sort-select" class="sort-sel" aria-label="Sort products">
              <option value="default">Sort: Default</option>
              <option value="price-asc">Price: Low to High</option>
              <option value="price-desc">Price: High to Low</option>
              <option value="name-asc">Name: A–Z</option>
            </select>

            <span id="results-count" class="results-n" aria-live="polite"></span>
          </div>

          <!-- Product grid — populated by JS -->
          <div id="prod-grid" class="prod-grid" aria-label="Products grid">
            <!-- Products rendered dynamically by script.js -->
          </div>

        </div>

      </div><!-- /prod-layout -->
    </div><!-- /container -->
  </main>

  <!-- ── FOOTER ── -->
  <footer class="site-footer">
    <div class="ft-inner">
      <div class="ft-top">
        <div>
          <div class="ft-logo">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 48" height="34">
              <circle cx="24" cy="24" r="17" fill="none" stroke="#E0E0E0" stroke-width="1.2"/>
              <line x1="14" y1="18" x2="34" y2="18" stroke="#E0E0E0" stroke-width="1.8" stroke-linecap="square"/>
              <line x1="24" y1="18" x2="24" y2="32" stroke="#E0E0E0" stroke-width="1.8" stroke-linecap="square"/>
              <line x1="54" y1="10" x2="54" y2="38" stroke="#565656" stroke-width="0.7"/>
              <text x="66" y="29" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="13" font-weight="200" letter-spacing="6" fill="#E0E0E0">TERYX</text>
            </svg>
          </div>
          <p class="ft-tagline">Premium tech &amp; accessories, curated for how you live and work.</p>
          <div class="socials">
            <a href="#" class="soc" aria-label="X"><svg viewBox="0 0 24 24"><path d="M4 4l16 16M20 4L4 20"/></svg></a>
            <a href="#" class="soc" aria-label="WhatsApp"><svg viewBox="0 0 24 24"><path d="M21 11.5a8.38 8.38 0 01-.9 3.8 8.5 8.5 0 01-7.6 4.7 8.38 8.38 0 01-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 01-.9-3.8 8.5 8.5 0 014.7-7.6 8.38 8.38 0 013.8-.9h.5a8.48 8.48 0 018 8v.5z"/></svg></a>
            <a href="#" class="soc" aria-label="Instagram"><svg viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r=".5" fill="currentColor" stroke="none"/></svg></a>
          </div>
        </div>
        <div>
          <p class="ft-col-t">Shop</p>
          <div class="ft-links">
            <a href="products.html?category=phones">Phones</a>
            <a href="products.html?category=laptops">Laptops</a>
            <a href="products.html?category=bags">Bags</a>
            <a href="products.html?category=watches">Watches</a>
          </div>
        </div>
        <div>
          <p class="ft-col-t">Info</p>
          <div class="ft-links">
            <a href="cart.html">Cart</a>
            <a href="checkout.html">Checkout</a>
          </div>
        </div>
      </div>
      <div class="ft-bot">
        <span class="ft-copy">&copy; 2025 Teryx. All rights reserved.</span>
      </div>
    </div>
  </footer>

  <div id="toasts" aria-live="polite"></div>
  <script src="js/script.js"></script>
</body>
</html>
